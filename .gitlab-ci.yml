stages:
  - build
  - test
  - push
  - deploy

variables:
  GCP_PROJECT_ID: "devops-lab-491207"
  GCP_REGION: "asia-southeast1"
  ARTIFACT_REGISTRY: "asia-southeast1-docker.pkg.dev"
  REGISTRY_NAME: "lab"
  REGISTRY_URL: "${ARTIFACT_REGISTRY}/${GCP_PROJECT_ID}/${REGISTRY_NAME}"

# ---------------------------------------------------
# BUILD STAGE
# ---------------------------------------------------

build:auth:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t auth-service:latest ./auth-service
  only:
    - main

build:user:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t user-service:latest ./user-service
  only:
    - main

build:order:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t order-service:latest ./order-service
  only:
    - main

build:frontend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t frontend:latest ./frontend
  only:
    - main

# ---------------------------------------------------
# TEST STAGE
# ---------------------------------------------------

test:auth:
  stage: test
  image: node:18-alpine
  before_script:
    - cd auth-service
    - npm install
  script:
    - npm run start &
    - sleep 3
    - echo "Auth service started"
  allow_failure: true
  only:
    - main

test:user:
  stage: test
  image: node:18-alpine
  before_script:
    - cd user-service
    - npm install
  script:
    - npm run start &
    - sleep 3
    - echo "User service started"
  allow_failure: true
  only:
    - main

test:order:
  stage: test
  image: node:18-alpine
  before_script:
    - cd order-service
    - npm install
  script:
    - npm run start &
    - sleep 3
    - echo "Order service started"
  allow_failure: true
  only:
    - main

test:frontend:
  stage: test
  image: node:18-alpine
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run build
  allow_failure: true
  only:
    - main

# ---------------------------------------------------
# PUSH STAGE (FIXED & LONG VERSION)
# ---------------------------------------------------

push:auth:
  stage: push
  image: google/cloud-sdk:slim
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$GCP_SA_KEY" > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
    - gcloud auth configure-docker ${ARTIFACT_REGISTRY} --quiet
  script:
    - docker build -t ${REGISTRY_URL}/auth-service:latest ./auth-service
    - docker push ${REGISTRY_URL}/auth-service:latest
  dependencies:
    - build:auth
  only:
    - main

push:user:
  stage: push
  image: google/cloud-sdk:slim
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$GCP_SA_KEY" > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
    - gcloud auth configure-docker ${ARTIFACT_REGISTRY} --quiet
  script:
    - docker build -t ${REGISTRY_URL}/user-service:latest ./user-service
    - docker push ${REGISTRY_URL}/user-service:latest
  dependencies:
    - build:user
  only:
    - main

push:order:
  stage: push
  image: google/cloud-sdk:slim
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$GCP_SA_KEY" > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
    - gcloud auth configure-docker ${ARTIFACT_REGISTRY} --quiet
  script:
    - docker build -t ${REGISTRY_URL}/order-service:latest ./order-service
    - docker push ${REGISTRY_URL}/order-service:latest
  dependencies:
    - build:order
  only:
    - main

push:frontend:
  stage: push
  image: google/cloud-sdk:slim
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$GCP_SA_KEY" > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
    - gcloud auth configure-docker ${ARTIFACT_REGISTRY} --quiet
  script:
    - docker build -t ${REGISTRY_URL}/frontend:latest ./frontend
    - docker push ${REGISTRY_URL}/frontend:latest
  dependencies:
    - build:frontend
  only:
    - main