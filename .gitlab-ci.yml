stages:
  - prepare
  - test
  - push

variables:
  GCP_PROJECT_ID: "devops-lab-491207"
  GCP_REGION: "asia-southeast1"
  ARTIFACT_REGISTRY: "asia-southeast1-docker.pkg.dev"
  REGISTRY_NAME: "lab"
  REGISTRY_URL: "${ARTIFACT_REGISTRY}/${GCP_PROJECT_ID}/${REGISTRY_NAME}"
  DB_INSTANCE: "lab-postgres"
  DB_NAME: "lab"
  DB_USER: "postgres"
  DB_PORT: "5432"
  DB_REGION: "asia-southeast1"

# ---------------------------------------------------
# PREPARE STAGE - Database Setup
# ---------------------------------------------------

prepare:database:
  stage: prepare
  image: google/cloud-sdk:latest
  before_script:
    - echo "$GCP_SA_KEY" > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json --quiet
    - gcloud config set project $GCP_PROJECT_ID --quiet
  script:
    - gcloud sql instances create $DB_INSTANCE --database-version=POSTGRES_15 --tier=db-f1-micro --region=$DB_REGION --quiet 2>/dev/null || echo "Instance already exists"
    - sleep 10
    - DB_HOST=$(gcloud sql instances describe $DB_INSTANCE --region=$DB_REGION --format='value(ipAddresses[0].ipAddress)')
    - echo "Database Host:$DB_HOST" > /tmp/db_host.txt
    - gcloud sql databases create $DB_NAME --instance=$DB_INSTANCE --quiet 2>/dev/null || echo "Database already exists"
    - gcloud sql users set-password postgres --instance=$DB_INSTANCE --password=$DB_PASSWORD --quiet
    - gcloud sql instances patch $DB_INSTANCE --allowed-networks=0.0.0.0/0 --quiet
  artifacts:
    paths:
      - /tmp/db_host.txt
  only:
    - main
  allow_failure: false

# ---------------------------------------------------
# TEST STAGE
# ---------------------------------------------------

test:auth:
  stage: test
  image: node:18-alpine
  before_script:
    - cd auth-service
    - npm install
  script:
    - npm run start &
    - sleep 3
    - echo "Auth service started"
  allow_failure: true
  only:
    - main

test:user:
  stage: test
  image: node:18-alpine
  before_script:
    - cd user-service
    - npm install
  script:
    - npm run start &
    - sleep 3
    - echo "User service started"
  allow_failure: true
  only:
    - main

test:order:
  stage: test
  image: node:18-alpine
  before_script:
    - cd order-service
    - npm install
  script:
    - npm run start &
    - sleep 3
    - echo "Order service started"
  allow_failure: true
  only:
    - main

test:frontend:
  stage: test
  image: node:18-alpine
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run build
  allow_failure: true
  only:
    - main

# ---------------------------------------------------
# PUSH STAGE - BUILD & PUSH DIRECTLY TO REGISTRY
# ---------------------------------------------------

push:auth:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$GCP_SA_KEY" | docker login -u _json_key --password-stdin https://${ARTIFACT_REGISTRY}
  script:
    - docker build -t ${REGISTRY_URL}/auth-service:latest ./auth-service
    - docker push ${REGISTRY_URL}/auth-service:latest
  only:
    - main

push:user:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$GCP_SA_KEY" | docker login -u _json_key --password-stdin https://${ARTIFACT_REGISTRY}
  script:
    - docker build -t ${REGISTRY_URL}/user-service:latest ./user-service
    - docker push ${REGISTRY_URL}/user-service:latest
  only:
    - main

push:order:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$GCP_SA_KEY" | docker login -u _json_key --password-stdin https://${ARTIFACT_REGISTRY}
  script:
    - docker build -t ${REGISTRY_URL}/order-service:latest ./order-service
    - docker push ${REGISTRY_URL}/order-service:latest
  only:
    - main

push:frontend:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$GCP_SA_KEY" | docker login -u _json_key --password-stdin https://${ARTIFACT_REGISTRY}
  script:
    - docker build -t ${REGISTRY_URL}/frontend:latest ./frontend
    - docker push ${REGISTRY_URL}/frontend:latest
  only:
    - main