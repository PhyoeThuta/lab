stages:
  - build
  - test
  - push
  - deploy

variables:
  GCP_PROJECT_ID: "devops-lab-491207"
  GCP_REGION: "asia-southeast1"
  ARTIFACT_REGISTRY: "asia-southeast1-docker.pkg.dev"
  REGISTRY_NAME: "lab"
  REGISTRY_URL: "${ARTIFACT_REGISTRY}/${GCP_PROJECT_ID}/${REGISTRY_NAME}"

# Build Auth Service
build:auth:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t auth-service:latest ./auth-service
  artifacts:
    reports:
      dotenv: build.env
  only:
    - main

# Build User Service
build:user:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t user-service:latest ./user-service
  artifacts:
    reports:
      dotenv: build.env
  only:
    - main

# Build Order Service
build:order:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t order-service:latest ./order-service
  artifacts:
    reports:
      dotenv: build.env
  only:
    - main

# Build Frontend
build:frontend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t frontend:latest ./frontend
  artifacts:
    reports:
      dotenv: build.env
  only:
    - main

# Test Auth Service
test:auth:
  stage: test
  image: node:18-alpine
  before_script:
    - cd auth-service
    - npm install
  script:
    - npm run start &
    - sleep 3
    - echo "Auth service started"
  allow_failure: true
  only:
    - main

# Test User Service
test:user:
  stage: test
  image: node:18-alpine
  before_script:
    - cd user-service
    - npm install
  script:
    - npm run start &
    - sleep 3
    - echo "User service started"
  allow_failure: true
  only:
    - main

