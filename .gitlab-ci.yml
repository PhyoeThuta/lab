stages:
  - test
  - push

variables:
  GCP_PROJECT_ID: "devops-lab-491207"
  GCP_REGION: "asia-southeast1"
  ARTIFACT_REGISTRY: "asia-southeast1-docker.pkg.dev"
  REGISTRY_NAME: "lab"
  REGISTRY_URL: "${ARTIFACT_REGISTRY}/${GCP_PROJECT_ID}/${REGISTRY_NAME}"

# ---------------------------------------------------
# TEST STAGE
# ---------------------------------------------------

test:auth:
  stage: test
  image: node:18-alpine
  before_script:
    - cd auth-service
    - npm install
  script:
    - npm run start &
    - sleep 3
    - echo "Auth service started"
  allow_failure: true
  only:
    - main

test:user:
  stage: test
  image: node:18-alpine
  before_script:
    - cd user-service
    - npm install
  script:
    - npm run start &
    - sleep 3
    - echo "User service started"
  allow_failure: true
  only:
    - main

test:order:
  stage: test
  image: node:18-alpine
  before_script:
    - cd order-service
    - npm install
  script:
    - npm run start &
    - sleep 3
    - echo "Order service started"
  allow_failure: true
  only:
    - main

test:frontend:
  stage: test
  image: node:18-alpine
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run build
  allow_failure: true
  only:
    - main

# ---------------------------------------------------
# PUSH STAGE - BUILD & PUSH DIRECTLY TO REGISTRY
# ---------------------------------------------------

push:auth:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache python3 py3-pip curl bash
    - pip install --break-system-packages google-cloud-storage
    - curl -O https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-sdk-linux-x86_64.tar.gz
    - tar xzf google-cloud-sdk-linux-x86_64.tar.gz -C /
    - /google-cloud-sdk/bin/gcloud auth activate-service-account --key-file=<(echo "$GCP_SA_KEY")
    - /google-cloud-sdk/bin/gcloud config set project $GCP_PROJECT_ID
    - /google-cloud-sdk/bin/gcloud auth configure-docker ${ARTIFACT_REGISTRY}
  script:
    - docker build -t ${REGISTRY_URL}/auth-service:latest ./auth-service
    - docker push ${REGISTRY_URL}/auth-service:latest
  only:
    - main

