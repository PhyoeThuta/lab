name: Build & Deploy to GKE

# Automated GKE deployment with Cloud SQL and Artifact Registry
on:
  push:
    branches: [ main ]

env:
  GCP_PROJECT_ID: "devops-lab-491207"
  ARTIFACT_REGISTRY: "us-central1-docker.pkg.dev"
  REGISTRY_NAME: "lab"
  GKE_CLUSTER: "lab-cluster"
  GKE_ZONE: "us-central1-a"
  GCP_REGION: "us-central1"
  KUBE_NAMESPACE: "production"
  CLOUDSQL_INSTANCE: "lab-postgres"
  CLOUDSQL_DATABASE: "lab"
  CLOUDSQL_USER: "postgres"

jobs:
  create-gke-cluster:
    name: Create or Verify GKE Cluster
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Check if cluster exists
        id: check-cluster
        run: |
          if gcloud container clusters describe ${{ env.GKE_CLUSTER }} --zone=${{ env.GKE_ZONE }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✓ GKE cluster already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "! GKE cluster does not exist, will create it"
          fi

      - name: Create GKE cluster (if not exists)
        if: steps.check-cluster.outputs.exists == 'false'
        run: |
          echo "Creating GKE cluster: ${{ env.GKE_CLUSTER }}..."
          gcloud container clusters create ${{ env.GKE_CLUSTER }} \
            --zone=${{ env.GKE_ZONE }} \
            --num-nodes=1 \
            --machine-type=e2-small \
            --enable-autorepair \
            --enable-autoupgrade \
            --addons=HttpLoadBalancing \
            --workload-pool=${{ env.GCP_PROJECT_ID }}.svc.id.goog \
            --no-enable-basic-auth \
            --enable-ip-alias \
            --enable-master-authorized-networks \
            --master-authorized-networks 0.0.0.0/0 \
            --quiet
          echo "✓ GKE cluster created successfully!"

      - name: Get cluster credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --zone=${{ env.GKE_ZONE }} \
            --project=${{ env.GCP_PROJECT_ID }}
          echo "✓ Cluster credentials configured"

  create-cloud-sql:
    name: Create Cloud SQL Instance
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Check if Cloud SQL instance exists
        id: check-sql
        run: |
          if gcloud sql instances describe ${{ env.CLOUDSQL_INSTANCE }} --quiet &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✓ Cloud SQL instance already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "! Cloud SQL instance does not exist, will create it"
          fi

      - name: Create Cloud SQL instance (if not exists)
        if: steps.check-sql.outputs.exists == 'false'
        run: |
          echo "Creating Cloud SQL instance: ${{ env.CLOUDSQL_INSTANCE }}..."
          gcloud sql instances create ${{ env.CLOUDSQL_INSTANCE }} \
            --database-version=POSTGRES_15 \
            --tier=db-f1-micro \
            --region=${{ env.GCP_REGION }} \
            --availability-type=zonal \
            --quiet
          
          echo "Waiting for instance to be ready (this may take 2-3 minutes)..."
          gcloud sql instances describe ${{ env.CLOUDSQL_INSTANCE }} --format='value(state)' > /tmp/instance_state.txt
          
          # Wait for instance to be RUNNABLE
          for i in {1..60}; do
            STATE=$(gcloud sql instances describe ${{ env.CLOUDSQL_INSTANCE }} --format='value(state)')
            echo "Instance state: $STATE (attempt $i/60)"
            if [ "$STATE" = "RUNNABLE" ]; then
              echo "✓ Cloud SQL instance is ready!"
              break
            fi
            sleep 10
          done
          
          # Final check
          STATE=$(gcloud sql instances describe ${{ env.CLOUDSQL_INSTANCE }} --format='value(state)')
          if [ "$STATE" != "RUNNABLE" ]; then
            echo "⚠ Instance state is $STATE, but continuing..."
          fi

      - name: Create database and user
        run: |
          echo "Waiting for Cloud SQL instance to be fully ready..."
          
          # Wait for instance to be RUNNABLE before operations
          for i in {1..60}; do
            STATE=$(gcloud sql instances describe ${{ env.CLOUDSQL_INSTANCE }} --format='value(state)' 2>/dev/null || echo "UNKNOWN")
            if [ "$STATE" = "RUNNABLE" ]; then
              echo "✓ Instance is RUNNABLE"
              break
            fi
            echo "Instance state: $STATE (attempt $i/60)"
            sleep 10
          done
          
          # Create database
          echo "Creating database..."
          gcloud sql databases create ${{ env.CLOUDSQL_DATABASE }} \
            --instance=${{ env.CLOUDSQL_INSTANCE }} \
            --quiet 2>/dev/null || echo "Database already exists"
          
          # Set password for postgres user
          echo "Setting database password..."
          gcloud sql users set-password ${{ env.CLOUDSQL_USER }} \
            --instance=${{ env.CLOUDSQL_INSTANCE }} \
            --password=${{ secrets.DB_PASSWORD }} \
            --quiet
          
          echo "✓ Database and user configured"

      - name: Get Cloud SQL Connection Name
        id: sql-conn
        run: |
          CONN_NAME=$(gcloud sql instances describe ${{ env.CLOUDSQL_INSTANCE }} --format='value(connectionName)')
          echo "connection_name=$CONN_NAME" >> $GITHUB_OUTPUT
          echo "Connection Name: $CONN_NAME"
  setup-artifact-registry:
    name: Setup Artifact Registry
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Create Artifact Registry repository (if not exists)
        run: |
          echo "Checking if Artifact Registry repository exists..."
          if gcloud artifacts repositories describe ${{ env.REGISTRY_NAME }} \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} &>/dev/null; then
            echo "✓ Artifact Registry repository already exists"
          else
            echo "Creating Artifact Registry repository..."
            gcloud artifacts repositories create ${{ env.REGISTRY_NAME }} \
              --repository-format=docker \
              --location=${{ env.GCP_REGION }} \
              --project=${{ env.GCP_PROJECT_ID }} \
              --quiet
            echo "✓ Artifact Registry repository created"
          fi

  setup-build-push:
    name: Setup, Build & Push Docker Images
    needs: [create-gke-cluster, setup-artifact-registry]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, order-service, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configure Docker authentication for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY_NAME }}/${{ matrix.service }}:latest
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY_NAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-gke:
    name: Deploy to GKE
    needs: [create-gke-cluster, create-cloud-sql, setup-build-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE cluster credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --zone=${{ env.GKE_ZONE }} \
            --project=${{ env.GCP_PROJECT_ID }}
          echo "✓ Cluster credentials obtained"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.KUBE_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          echo "✓ Namespace created/verified"

      - name: Create Secrets
        run: |
          CONN_NAME=$(gcloud sql instances describe ${{ env.CLOUDSQL_INSTANCE }} --format='value(connectionName)')
          
          kubectl create secret generic app-secrets \
            --from-literal=DB_HOST_CLOUDSQL=$CONN_NAME \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --namespace=${{ env.KUBE_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✓ Secrets created"

      - name: Create ConfigMap
        run: |
          kubectl create configmap app-config \
            --from-literal=DB_PORT=5432 \
            --from-literal=DB_NAME=${{ env.CLOUDSQL_DATABASE }} \
            --from-literal=DB_USER=${{ env.CLOUDSQL_USER }} \
            --from-literal=JWT_EXPIRES_IN=24h \
            --from-literal=AUTH_SERVICE_URL=http://auth-service.${{ env.KUBE_NAMESPACE }}.svc.cluster.local:3001 \
            --from-literal=USER_SERVICE_URL=http://user-service.${{ env.KUBE_NAMESPACE }}.svc.cluster.local:3002 \
            --from-literal=ORDER_SERVICE_URL=http://order-service.${{ env.KUBE_NAMESPACE }}.svc.cluster.local:3003 \
            --namespace=${{ env.KUBE_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✓ ConfigMap created"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/serviceaccount.yaml
          kubectl apply -f k8s/auth-service.yaml
          kubectl apply -f k8s/user-service.yaml
          kubectl apply -f k8s/order-service.yaml
          kubectl apply -f k8s/frontend.yaml
          echo "✓ All manifests applied"

      - name: Wait for deployments
        run: |
          kubectl rollout status deployment/auth-service -n ${{ env.KUBE_NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/user-service -n ${{ env.KUBE_NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/order-service -n ${{ env.KUBE_NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/frontend -n ${{ env.KUBE_NAMESPACE }} --timeout=5m
          echo "✓ All deployments ready"

      - name: Get service info
        run: |
          echo "=== Service Endpoints ==="
          kubectl get svc -n ${{ env.KUBE_NAMESPACE }}
          echo ""
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.KUBE_NAMESPACE }}
